# ArgoCD Cluster Secret for GKE Staging
#
# Registers the GKE staging cluster with ArgoCD as a remote deployment target.
# Pulls cluster endpoint, CA cert, and exec provider config from 1Password.
#
# The 1Password item "argocd-gke-staging-cluster" should have these fields:
#   name   — "gke-staging"
#   server — "https://<GKE_CLUSTER_ENDPOINT>" (from: terraform output -raw cluster_endpoint)
#   config — JSON exec provider config (see below)
#
# config field value:
#   {
#     "execProviderConfig": {
#       "command": "argocd-k8s-auth",
#       "args": ["gcp"],
#       "apiVersion": "client.authentication.k8s.io/v1beta1",
#       "env": [
#         {
#           "name": "GOOGLE_APPLICATION_CREDENTIALS",
#           "value": "/var/run/secrets/gcp/credential-config.json"
#         }
#       ]
#     },
#     "tlsClientConfig": {
#       "insecure": false,
#       "caData": "<BASE64_CA_CERTIFICATE>"
#     }
#   }
#
# Get caData from: terraform output -raw cluster_ca_certificate
#
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: gke-staging-cluster
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
spec:
  itemPath: "vaults/homelab/items/argocd-gke-staging-cluster"
