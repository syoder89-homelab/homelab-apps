---
# Source: stock-ticker/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-ticker
  annotations:
    operator.1password.io/auto-restart: "true"
  labels:
    app: stock-ticker
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: stock-ticker
  template:
    metadata:
      labels:
        app: stock-ticker
      annotations:
        checksum/config: c93611ae54534f0efed266fe73d1dbc6e3e6c06045d30a59fae3b382a8b04d7b
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
      - name: stock-ticker
        image: us-central1-docker.pkg.dev/personal-356214/stock-ticker/stock-ticker:20260413-ad6b993
        imagePullPolicy: IfNotPresent
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
        envFrom:
        - configMapRef:
            name: stock-ticker
        env:
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: stock-ticker-api-credentials
              key: credential
        - name: GOMEMLIMIT
          valueFrom:
            resourceFieldRef:
              resource: requests.memory
        ports:
        - name: http
          containerPort: 8080
        startupProbe:
          httpGet:
            path: /startupz
            port: http
          failureThreshold: 30
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          periodSeconds: 10
          failureThreshold: 3
        resources:
          limits:
            memory: 32Mi
          requests:
            cpu: 8m
            memory: 32Mi
