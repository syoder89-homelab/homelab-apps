# ArgoCD Cluster Secret for GKE Staging
#
# This secret registers the GKE staging cluster with ArgoCD as a remote deployment target.
# Authentication uses Workload Identity Federation (WIF) — no long-lived service account keys.
#
# The argocd-k8s-auth exec provider obtains short-lived GKE credentials using the
# GCP credential configuration mounted at /var/run/secrets/gcp/credential-config.json.
# That credential config exchanges the projected K8s SA token for a GCP access token.
#
# To populate server and caData:
#   1. Run `terraform apply` in homelab-infra/terraform/gke/
#   2. Get endpoint: terraform output -raw cluster_endpoint
#   3. Get CA cert:  terraform output -raw cluster_ca_certificate
#
apiVersion: v1
kind: Secret
metadata:
  name: gke-staging-cluster
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
type: Opaque
stringData:
  name: gke-staging
  # Replace with actual GKE cluster endpoint after terraform apply
  server: "https://GKE_CLUSTER_ENDPOINT"
  config: |
    {
      "execProviderConfig": {
        "command": "argocd-k8s-auth",
        "args": ["gcp"],
        "apiVersion": "client.authentication.k8s.io/v1beta1",
        "env": [
          {
            "name": "GOOGLE_APPLICATION_CREDENTIALS",
            "value": "/var/run/secrets/gcp/credential-config.json"
          }
        ]
      },
      "tlsClientConfig": {
        "insecure": false,
        "caData": "BASE64_CA_CERTIFICATE"
      }
    }
