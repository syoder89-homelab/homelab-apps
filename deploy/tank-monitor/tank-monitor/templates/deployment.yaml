---
# Source: tank-monitor/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-tank-monitor
  namespace: test-taylor-monitoring
  labels:
    app: test-tank-monitor
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: test-tank-monitor
  template:
    metadata:
      labels:
        app: test-tank-monitor
    spec:
      containers:
      - name: test-tank-monitor
        image: syoder89/tank-monitor:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: SENSOR
          value: "taylor_water_tank_level1"
        - name: BROKER
          value: "tcp://mosquitto:1883"
        - name: VM_PUSH_URL
          value: "http://victoria-metrics-victoria-metrics-single-server:8428/api/v1/import/prometheus"
        - name: PROBE_ADDR
          value: ":8080"
        - name: OTLP_ENDPOINT
          value: "tempo.observability:4317"
        ports:
        - name: metrics
          containerPort: 8080
        startupProbe:
          httpGet:
            path: /startupz
            port: metrics
          failureThreshold: 30
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: metrics
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: metrics
          periodSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 64Mi
