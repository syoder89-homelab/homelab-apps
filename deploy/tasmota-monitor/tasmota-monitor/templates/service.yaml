apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: test-tasmota-monitor
  namespace: test-taylor-monitoring
  labels:
    app: test-tasmota-monitor
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: test-tasmota-monitor
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
