envs:
  prod:
    promotedFrom: staging
    sources:
      # direct: true
      stages:
      - staging-{{ .app.name }}
    asPR: true
    isEphemeral: false
    targetBranchPrefix: env/prod
    envType: prod
  staging:
    enabled: false
    promotedFrom: test
    sources:
      stages:
      - test-{{ .app.name }}
    asPR: true
    isEphemeral: true
    targetBranchPrefix: env/staging
    envType: staging
    clusterName: gke-staging
  test:
    sources:
      direct: true
    asPR: true
    isEphemeral: true
    targetBranchPrefix: env/test
    envType: test