apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
      - name: {{ .Release.Name }}
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: IfNotPresent
        env:
        - name: SENSOR
          value: {{ .Values.sensor | quote }}
        - name: BROKER
          value: {{ .Values.broker | quote }}
        - name: VM_PUSH_URL
          value: {{ .Values.vmPushURL | quote }}
        - name: PROBE_ADDR
          value: {{ .Values.probeAddr | quote }}
        {{- if .Values.otlpEndpoint }}
        - name: OTLP_ENDPOINT
          value: {{ .Values.otlpEndpoint | quote }}
        {{- end }}
        ports:
        - name: metrics
          containerPort: 8080
        startupProbe:
          httpGet:
            path: /startupz
            port: metrics
          failureThreshold: 30
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: metrics
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: metrics
          periodSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 64Mi
