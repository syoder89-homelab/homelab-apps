{{- range $path, $_ := .Files.Glob "applications/*/Chart.yaml" }}
{{- $app := $.Files.Get $path | fromYaml }}
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: {{ $app.name }}
  namespace: {{ $.Values.kargo.projectName }}
spec:
  subscriptions:
  - git:
      branch: main
      commitSelectionStrategy: NewestFromBranch
      discoveryLimit: 10
      strictSemvers: true
      repoURL: {{ $.Values.repo.repoURL }}.git
      includePaths:
      - {{ dir $path }}
      # Alternate config strategy
      #- stages/**/{{ $app.name }}-values.yaml
{{- if $app.imageSubscriptions }}
{{- range $app.imageSubscriptions }}
  - image:
      repoURL: {{ .repoURL }}
      tagSelectionStrategy: {{ .tagSelectionStrategy | default "NewestBuild" }}
      strictSemvers: false
{{- if .allowTags }}
      allowTags: {{ .allowTags }}
{{- end }}
      discoveryLimit: {{ .discoveryLimit | default 10 }}
{{- end }}
{{- end }}
{{- end }}