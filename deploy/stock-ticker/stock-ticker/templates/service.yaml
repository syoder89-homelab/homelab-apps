---
# Source: stock-ticker/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: test-stock-ticker
  labels:
    app: test-stock-ticker
spec:
  type: ClusterIP
  selector:
    app: test-stock-ticker
  ports:
  - name: http
    port: 8080
    targetPort: http
---
# Source: stock-ticker/templates/service.yaml
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: test-stock-ticker
  namespace: test-stock-ticker
  labels:
    app: test-stock-ticker
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: test-stock-ticker
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
