# GCP Workload Identity Federation credential configuration for ArgoCD
#
# Pulls the credential config JSON from 1Password. The 1Password item should have
# a field named "credential-config.json" containing the JSON from:
#   cd homelab-infra/terraform/bootstrap && terraform output -raw argocd_credential_config
#
# The 1Password Connect operator creates a Secret with the same name, populated
# with the item's fields. The Secret is mounted into the ArgoCD application-controller.
#
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: argocd-gcp-wif-config
  namespace: argocd
spec:
  itemPath: "vaults/homelab/items/argocd-gcp-wif-config"
